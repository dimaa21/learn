<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Основи Vue</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/x-icon" href="/img/logo.png" />
  </head>
  <body>
    <div class="container" id="app">
      <div class="card">
        <!-- {{ title }} — реактивне відображення даних. -->
        <h1>{{ title }}</h1>

        <div class="form-control">
          <!-- placeholder не статичний, а береться з JavaScript-коду Vue. -->
          <input
            type="text"
            v-bind:placeholder="placeholderString"
            v-bind:value="inputValue"
            v-on:input="inputChangeHandler"
            v-on:keypress.enter="inputKeyPress"
          />
        </div>
        <button class="btn" v-on:click="addNewNote">Додати</button>
        <hr />
        <ul class="list">
          <li class="list-item" v-for="note in notes">
            {{ note }}
          </li>
        </ul>
      </div>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="main.js"></script>
  </body>
</html>
